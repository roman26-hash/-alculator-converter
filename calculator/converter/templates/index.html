<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Калькулятор-конвертер</title>
    <!-- Bootstrap CSS (CDN) -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 0;
        }
        .card {
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 20px 20px 0 0 !important;
            font-size: 24px;
            font-weight: bold;
            text-align: center;
        }
        .result-card {
            background-color: #f8f9fa;
            border-left: 4px solid #667eea;
        }
        .result-value {
            font-size: 28px;
            font-weight: bold;
            color: #667eea;
        }
        .btn-convert {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            width: 100%;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
        }
        .btn-convert:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card">
                    <div class="card-header">
                        🔄 Калькулятор-конвертер
                    </div>
                    <div class="card-body">

                        <!-- Блок с ошибкой -->
                        {% if error %}
                        <div class="alert alert-danger alert-dismissible fade show" role="alert">
                            ⚠️ {{ error }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                        </div>
                        {% endif %}

                        <!-- Блок с результатом -->
                        {% if result is not none and not error %}
                        <div class="card result-card mb-4">
                            <div class="card-body text-center">
                                <div class="text-muted mb-2">Результат конвертации:</div>
                                <div class="result-value">{{ from_value }} = {{ to_value }}</div>
                            </div>
                        </div>
                        {% endif %}

                        <!-- Форма -->
                        <form method="POST">
                            <!-- Тип конвертации -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">📐 Тип конвертации</label>
                                <select name="conv_type" class="form-select" onchange="this.form.submit()">
                                    {% for type_id, type_name in CONVERSION_TYPES.items() %}
                                    <option value="{{ type_id }}" {% if conv_type == type_id %}selected{% endif %}>
                                        {{ type_name }}
                                    </option>
                                    {% endfor %}
                                </select>
                            </div>

                            <!-- Число для конвертации -->
                            <div class="mb-3">
                                <label class="form-label fw-bold">🔢 Введите число</label>
                                <input type="number" step="any" name="amount"
                                       class="form-control" value="{{ amount }}"
                                       placeholder="Например: 100" required>
                            </div>

                            <!-- Выбор единиц -->
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">📤 Из:</label>
                                    <select name="from_unit" class="form-select">
                                        {% if conv_type == 'length' %}
                                            {% for unit in length_units %}
                                            <option value="{{ unit }}" {% if from_unit == unit %}selected{% endif %}>
                                                {% if unit == 'm' %}Метр (м)
                                                {% elif unit == 'km' %}Километр (км)
                                                {% elif unit == 'cm' %}Сантиметр (см)
                                                {% elif unit == 'mm' %}Миллиметр (мм)
                                                {% elif unit == 'mile' %}Миля
                                                {% elif unit == 'ft' %}Фут
                                                {% elif unit == 'in' %}Дюйм
                                                {% endif %}
                                            </option>
                                            {% endfor %}
                                        {% elif conv_type == 'weight' %}
                                            {% for unit in weight_units %}
                                            <option value="{{ unit }}" {% if from_unit == unit %}selected{% endif %}>
                                                {% if unit == 'kg' %}Килограмм (кг)
                                                {% elif unit == 'g' %}Грамм (г)
                                                {% elif unit == 'mg' %}Миллиграмм (мг)
                                                {% elif unit == 'lb' %}Фунт (lb)
                                                {% elif unit == 'oz' %}Унция (oz)
                                                {% elif unit == 't' %}Тонна (т)
                                                {% endif %}
                                            </option>
                                            {% endfor %}
                                        {% elif conv_type == 'temperature' %}
                                            {% for unit in temp_units %}
                                            <option value="{{ unit }}" {% if from_unit == unit %}selected{% endif %}>
                                                {% if unit == 'c' %}Цельсий (°C)
                                                {% elif unit == 'f' %}Фаренгейт (°F)
                                                {% elif unit == 'k' %}Кельвин (K)
                                                {% endif %}
                                            </option>
                                            {% endfor %}
                                        {% elif conv_type == 'currency' %}
                                            {% for unit in currency_units %}
                                            <option value="{{ unit }}" {% if from_unit == unit %}selected{% endif %}>
                                                {{ unit }}
                                            </option>
                                            {% endfor %}
                                        {% endif %}
                                    </select>
                                </div>

                                <div class="col-md-6 mb-3">
                                    <label class="form-label fw-bold">📥 В:</label>
                                    <select name="to_unit" class="form-select">
                                        {% if conv_type == 'length' %}
                                            {% for unit in length_units %}
                                            <option value="{{ unit }}" {% if to_unit == unit %}selected{% endif %}>
                                                {% if unit == 'm' %}Метр (м)
                                                {% elif unit == 'km' %}Километр (км)
                                                {% elif unit == 'cm' %}Сантиметр (см)
                                                {% elif unit == 'mm' %}Миллиметр (мм)
                                                {% elif unit == 'mile' %}Миля
                                                {% elif unit == 'ft' %}Фут
                                                {% elif unit == 'in' %}Дюйм
                                                {% endif %}
                                            </option>
                                            {% endfor %}
                                        {% elif conv_type == 'weight' %}
                                            {% for unit in weight_units %}
                                            <option value="{{ unit }}" {% if to_unit == unit %}selected{% endif %}>
                                                {% if unit == 'kg' %}Килограмм (кг)
                                                {% elif unit == 'g' %}Грамм (г)
                                                {% elif unit == 'mg' %}Миллиграмм (мг)
                                                {% elif unit == 'lb' %}Фунт (lb)
                                                {% elif unit == 'oz' %}Унция (oz)
                                                {% elif unit == 't' %}Тонна (т)
                                                {% endif %}
                                            </option>
                                            {% endfor %}
                                        {% elif conv_type == 'temperature' %}
                                            {% for unit in temp_units %}
                                            <option value="{{ unit }}" {% if to_unit == unit %}selected{% endif %}>
                                                {% if unit == 'c' %}Цельсий (°C)
                                                {% elif unit == 'f' %}Фаренгейт (°F)
                                                {% elif unit == 'k' %}Кельвин (K)
                                                {% endif %}
                                            </option>
                                            {% endfor %}
                                        {% elif conv_type == 'currency' %}
                                            {% for unit in currency_units %}
                                            <option value="{{ unit }}" {% if to_unit == unit %}selected{% endif %}>
                                                {{ unit }}
                                            </option>
                                            {% endfor %}
                                        {% endif %}
                                    </select>
                                </div>
                            </div>

                            <button type="submit" class="btn btn-convert text-white mt-2">
                                🔄 Конвертировать
                            </button>
                        </form>

                        <hr class="my-4">

                        <div class="text-muted small text-center">
                            💡 Курсы валют обновляются раз в час<br>
                            📊 Поддерживаются все основные валюты
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
